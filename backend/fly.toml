# Fly.io app config. Run `fly launch` the first time to create the app
# with the name you pick; thereafter `fly deploy` reuses this file.
#
# Required env (set via `fly secrets set`):
#   DATABASE_URL = postgresql://...     Postgres connection string
#   JWT_SECRET   = <long random string>  64+ random chars. Rotate to
#                                         invalidate all sessions at once.

app = "taskapp-workout"
primary_region = "iad"   # pick closer to you if desired

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Runs once in a fresh machine before the new version takes traffic.
  # Two steps:
  #   1. scripts/migrate.py — applies any pending numbered migrations
  #      from backend/migrations/ and stamps schema_migrations. Idempotent.
  #   2. seed_workouts.py — re-seeds globals from
  #      seed_data/exercise_snapshot.json (or falls back to the hardcoded
  #      EXERCISES list when no snapshot is committed yet). Idempotent.
  # Non-zero exit at any step aborts the deploy. The app's init_db now
  # requires schema_migrations to be populated; if migrate.py fails the
  # next-version machine refuses to start, so traffic continues to flow
  # to the prior version.
  # Wrapped in `sh -c` because Fly passes release_command as a single
  # argv when it doesn't see shell metacharacters interpreted by a
  # shell — without the wrapper, `&&` and the second command are passed
  # as ARGS to migrate.py, which fails with
  # `unrecognized arguments: && python seed_workouts.py`. This bit us
  # in late April 2026 — auto-deploy silently failed for several PRs
  # (#122 backend route landed in master but never reached Fly,
  # producing 404s on /tasks/N/uncomplete in prod). See README's
  # "deploy notes" for the symptom.
  release_command = "sh -c 'python scripts/migrate.py && python seed_workouts.py'"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"      # room for Neon cold-start wake-up
    method = "GET"
    path = "/health"
    grace_period = "30s"  # covers deploy + Neon double cold start

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"           # plenty for FastAPI; bump if you add workers
