# Fly.io app config. Run `fly launch` the first time to create the app
# with the name you pick; thereafter `fly deploy` reuses this file.
#
# Required env (set via `fly secrets set`):
#   DATABASE_URL = postgresql://...     Postgres connection string
#   JWT_SECRET   = <long random string>  64+ random chars. Rotate to
#                                         invalidate all sessions at once.

app = "taskapp-workout"
primary_region = "iad"   # pick closer to you if desired

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Runs once in a fresh machine before the new version takes traffic.
  # Idempotent: re-seeds globals from seed_data/exercise_snapshot.json
  # (or falls back to the hardcoded defaults in seed_workouts.py when no
  # snapshot is committed yet). Non-zero exit aborts the deploy.
  release_command = "python seed_workouts.py"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # Always-on; uses free-tier allowance, eliminates cold start.
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"      # room for Neon cold-start wake-up
    method = "GET"
    path = "/health"
    grace_period = "30s"  # covers deploy + Neon double cold start

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"           # plenty for FastAPI; bump if you add workers
