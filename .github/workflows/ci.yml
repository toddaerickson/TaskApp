name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: backend pytest (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        # Only actually used by the postgres matrix leg; harmless to stand
        # up for the sqlite leg as well.
        image: postgres:16
        env:
          POSTGRES_USER: taskapp
          POSTGRES_PASSWORD: taskapp
          POSTGRES_DB: taskapp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: ${{ matrix.db == 'postgres' && 'postgresql://taskapp:taskapp@localhost:5432/taskapp_test' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Lint (ruff — real bugs only, not style)
        run: ruff check --select F .

      - name: Test
        run: pytest -q

  mobile:
    name: mobile jest + tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --ci
