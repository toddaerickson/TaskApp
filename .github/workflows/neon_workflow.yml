name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  delete:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: read

jobs:
  setup:
    name: Setup
    if: github.event_name == 'pull_request'
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch_encode.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch_encode.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Create Neon Branch
        id: create_neon_branch_encode
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch_on_pr_close:
    name: Delete Neon Branch (PR closed)
    needs: setup
    if: |
      github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Delete Neon Branch (idempotent)
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_BRANCH: preview/${{ needs.setup.outputs.branch }}
        run: |
          npm i -g neonctl@v2 --silent
          out=$(neonctl branches delete "$NEON_BRANCH" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" 2>&1) && status=0 || status=$?
          echo "$out"
          if [ "$status" -eq 0 ]; then
            echo "Deleted $NEON_BRANCH"
          elif echo "$out" | grep -qi "not found"; then
            echo "Branch $NEON_BRANCH already gone — ok"
          else
            exit "$status"
          fi

  delete_neon_branch_on_branch_delete:
    name: Delete Neon Branch (branch deleted)
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Delete Neon Branch (idempotent)
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_BRANCH: preview/${{ github.event.ref }}
        run: |
          npm i -g neonctl@v2 --silent
          out=$(neonctl branches delete "$NEON_BRANCH" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" 2>&1) && status=0 || status=$?
          echo "$out"
          if [ "$status" -eq 0 ]; then
            echo "Deleted $NEON_BRANCH"
          elif echo "$out" | grep -qi "not found"; then
            echo "Branch $NEON_BRANCH already gone — ok"
          else
            exit "$status"
          fi
