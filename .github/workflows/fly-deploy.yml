name: Deploy backend to Fly.io

# Auto-deploy the FastAPI backend to Fly whenever backend code lands on
# main. The frontend is on Vercel (separate auto-deploy) so we don't
# trigger on mobile-only changes. `workflow_dispatch` lets you force a
# manual redeploy from the Actions tab without a code change.
#
# One-time setup: create a FLY_API_TOKEN secret in
#   Settings → Secrets and variables → Actions
# Token source:
#   fly tokens create deploy -x 999999h  (on a machine with flyctl)
# or via the Fly dashboard → Account → Access Tokens.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch:

# Least-privilege per CLAUDE.md guidance. issues: write is needed by the
# alert-on-failure step at the bottom so a silent deploy outage (the
# April 2026 class — auto-deploy quietly failed for 4 days while 6
# backend PRs accumulated in master) gets a GitHub issue + email instead
# of a red badge nobody looks at.
permissions:
  contents: read
  issues: write
  actions: read

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: backend
        # Pass the commit SHA + build timestamp as Docker build args so
        # the Dockerfile bakes them in as ENV. /health then echoes them
        # back, giving operators a one-tap check of "is the live backend
        # on the post-merge commit?" — mirrors the frontend build-stamp
        # diagnostic from PR #127.
        run: |
          flyctl deploy --remote-only \
            --build-arg BUILD_SHA="${GITHUB_SHA:0:12}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Post-deploy smoke
        # Catches "deploy succeeded but new release serves a 500" — the
        # exact failure the build-stamp diagnostic in CLAUDE.md was
        # added to spot, but only AFTER an operator notices the
        # symptom. This step closes that loop automatically.
        #
        # Hits `/health/detailed` on the public URL with the
        # operator's snapshot bearer token. Retries 3× with 10s
        # backoff because Fly's edge takes a few seconds to route
        # traffic to the new release after `flyctl deploy` returns.
        #
        # Required repo secrets:
        #   FLY_PUBLIC_URL       — e.g. https://taskapp-workout.fly.dev
        #   SNAPSHOT_AUTH_TOKEN  — same value already on Fly + used by
        #                          backup-neon.yml + image-smoke.yml
        # Silent no-op when either is unset, so this ships safely
        # without operator pre-config. Gating lives in the bash
        # script — `if: ${{ secrets.X != '' }}` at the step level
        # is rejected by GitHub Actions ("Unrecognized named-value:
        # 'secrets'") and would brick the entire deploy workflow.
        # See PR-X2 + CLAUDE.md backup section.
        env:
          FLY_PUBLIC_URL: ${{ secrets.FLY_PUBLIC_URL }}
          SNAPSHOT_AUTH_TOKEN: ${{ secrets.SNAPSHOT_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_PUBLIC_URL:-}" ] || [ -z "${SNAPSHOT_AUTH_TOKEN:-}" ]; then
            echo "FLY_PUBLIC_URL or SNAPSHOT_AUTH_TOKEN not configured — skipping post-deploy smoke."
            exit 0
          fi
          URL="${FLY_PUBLIC_URL%/}/health/detailed"
          for attempt in 1 2 3; do
            echo "Attempt $attempt: GET $URL"
            CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' \
                   -H "Authorization: Bearer $SNAPSHOT_AUTH_TOKEN" \
                   --max-time 15 \
                   "$URL" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "  ✓ Health endpoint returned 200"
              # Sanity-check the response shape so a 200 from a stale
              # cache or a misrouted reverse proxy doesn't mask a
              # real problem. Required keys mirror the contract in
              # main.py:health_detailed.
              python3 - <<'PY'
          import json, sys
          body = json.load(open('/tmp/health.json'))
          required = {'status', 'db_type', 'db_reachable', 'jwt_secret_configured', 'public_url_configured'}
          missing = required - set(body)
          if missing:
              print(f'::error::/health/detailed missing keys: {sorted(missing)}', file=sys.stderr)
              sys.exit(1)
          if body['status'] != 'ok':
              print(f'::error::/health/detailed status != ok: {body["status"]}', file=sys.stderr)
              sys.exit(1)
          if not body['db_reachable']:
              print(f'::error::/health/detailed db_reachable=False: {body.get("db_error")}', file=sys.stderr)
              sys.exit(1)
          print(f'  ✓ Response shape OK (db_type={body["db_type"]})')
          PY
              exit 0
            fi
            echo "  HTTP $CODE — backing off 10s before retry"
            sleep 10
          done
          echo "::error::Post-deploy smoke FAILED — /health/detailed never returned 200 after 3 attempts." >&2
          echo "Last response body:" >&2
          cat /tmp/health.json >&2 || true
          exit 1

      - name: Alert on failure
        # Closes the RUNTIME class of silent deploy outage (the April
        # 2026 incident: auto-deploy failed 4 nights in a row while
        # 6 backend PRs piled up in master; only the red Actions badge
        # signaled it, and nobody was watching). GitHub doesn't email
        # on push-triggered workflow failure for the repo owner by
        # default, but issue notifications fire under everyone's
        # defaults. Mirrors the alert pattern from backup-neon.yml.
        #
        # De-dup: if an open `[deploy]` failure issue already exists,
        # comment on it instead of opening a new one. Without this,
        # 7 nights of failure → 7 issues, which is noise that trains
        # people to ignore the signal.
        #
        # Differentiated alert: surfaces the first failed step name so
        # operators can triage from the issue thread without clicking
        # into the run. "Deploy" vs "Post-deploy smoke" is a sharp
        # diagnostic split — the former is "fly build broke," the
        # latter is "fly built fine but the new release is sick."
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TITLE="[deploy] Backend deploy is failing"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="${SHA:0:12}"
          FAILED_STEP=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
              --jq '[.jobs[].steps[]? | select(.conclusion == "failure")][0].name // "unknown"' \
              2>/dev/null || echo "unknown")
          COMMENT="Failed run: $RUN_URL  (UTC $NOW)
          Commit: \`$SHORT_SHA\`
          Failed step: \`$FAILED_STEP\`"
          EXISTING=$(gh issue list \
              --state open \
              --search "in:title \"$TITLE\"" \
              --json number \
              --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Appending to existing alert issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$COMMENT"
          else
            echo "Opening new alert issue"
            BODY=$(cat <<EOF
          The backend auto-deploy to Fly has failed.

          $COMMENT

          **Why this matters:** any backend PR merged to \`main\` while
          this issue stays open is **not running in production**. The
          public API is serving the last-successful release. The Settings
          tab build-stamp footer (frontend SHA vs backend SHA) will visibly
          diverge while the gap persists.

          **First diagnostic:** open the failed run above and look at
          \`Failed step\`. The most common failure modes are:
          - \`Deploy\` (flyctl) — \`fly.toml release_command\` shlex bug
            (must be wrapped in \`sh -c\` per CLAUDE.md), missing/expired
            \`FLY_API_TOKEN\`, Neon compute quota exhausted, or a
            Dockerfile build error.
          - \`Post-deploy smoke\` — Fly built + released fine, but the
            new image's \`/health/detailed\` returned non-200 or a sick
            body. Often a missing Fly secret on the new release
            (\`JWT_SECRET\`, \`DATABASE_URL\`, etc.) or a migration
            that failed to run inside \`release_command\`.

          **Close this issue** once a green deploy lands. Subsequent
          failures will comment on the still-open one so the alert
          thread stays consolidated.
          EOF
          )
            gh issue create --title "$TITLE" --body "$BODY"
          fi
