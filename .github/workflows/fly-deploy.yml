name: Deploy backend to Fly.io

# Auto-deploy the FastAPI backend to Fly whenever backend code lands on
# master. The frontend is on Vercel (separate auto-deploy) so we don't
# trigger on mobile-only changes. `workflow_dispatch` lets you force a
# manual redeploy from the Actions tab without a code change.
#
# One-time setup: create a FLY_API_TOKEN secret in
#   Settings → Secrets and variables → Actions
# Token source:
#   fly tokens create deploy -x 999999h  (on a machine with flyctl)
# or via the Fly dashboard → Account → Access Tokens.

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Post-deploy smoke
        # Catches "deploy succeeded but new release serves a 500" — the
        # exact failure the build-stamp diagnostic in CLAUDE.md was
        # added to spot, but only AFTER an operator notices the
        # symptom. This step closes that loop automatically.
        #
        # Hits `/health/detailed` on the public URL with the
        # operator's snapshot bearer token. Retries 3× with 10s
        # backoff because Fly's edge takes a few seconds to route
        # traffic to the new release after `flyctl deploy` returns.
        #
        # Required repo secrets:
        #   FLY_PUBLIC_URL       — e.g. https://taskapp-workout.fly.dev
        #   SNAPSHOT_AUTH_TOKEN  — same value already on Fly + used by
        #                          backup-neon.yml + image-smoke.yml
        # Silent no-op when either is unset, so this ships safely
        # without operator pre-config.
        if: ${{ secrets.FLY_PUBLIC_URL != '' && secrets.SNAPSHOT_AUTH_TOKEN != '' }}
        env:
          FLY_PUBLIC_URL: ${{ secrets.FLY_PUBLIC_URL }}
          SNAPSHOT_AUTH_TOKEN: ${{ secrets.SNAPSHOT_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          URL="${FLY_PUBLIC_URL%/}/health/detailed"
          for attempt in 1 2 3; do
            echo "Attempt $attempt: GET $URL"
            CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' \
                   -H "Authorization: Bearer $SNAPSHOT_AUTH_TOKEN" \
                   --max-time 15 \
                   "$URL" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "  ✓ Health endpoint returned 200"
              # Sanity-check the response shape so a 200 from a stale
              # cache or a misrouted reverse proxy doesn't mask a
              # real problem. Required keys mirror the contract in
              # main.py:health_detailed.
              python3 - <<'PY'
          import json, sys
          body = json.load(open('/tmp/health.json'))
          required = {'status', 'db_type', 'db_reachable', 'jwt_secret_configured', 'public_url_configured'}
          missing = required - set(body)
          if missing:
              print(f'::error::/health/detailed missing keys: {sorted(missing)}', file=sys.stderr)
              sys.exit(1)
          if body['status'] != 'ok':
              print(f'::error::/health/detailed status != ok: {body["status"]}', file=sys.stderr)
              sys.exit(1)
          if not body['db_reachable']:
              print(f'::error::/health/detailed db_reachable=False: {body.get("db_error")}', file=sys.stderr)
              sys.exit(1)
          print(f'  ✓ Response shape OK (db_type={body["db_type"]})')
          PY
              exit 0
            fi
            echo "  HTTP $CODE — backing off 10s before retry"
            sleep 10
          done
          echo "::error::Post-deploy smoke FAILED — /health/detailed never returned 200 after 3 attempts." >&2
          echo "Last response body:" >&2
          cat /tmp/health.json >&2 || true
          exit 1
