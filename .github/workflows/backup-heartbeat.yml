name: Backup heartbeat

# Detects when the nightly backup workflow has stopped *running at all*.
# This is the meta-failure mode that none of the other backup safety
# nets catch:
#
#   - backup-neon.yml fails  → opens [backup] alert issue
#   - backup-restore-drill.yml fails → comments on same issue
#   - backup-neon.yml DOESN'T RUN → silence
#
# The third case is real. GitHub disables scheduled workflows on repos
# with no commits in 60 days; cron can stop firing during GH Actions
# scheduling outages; a bad workflow-file edit can de-schedule without
# any other signal. The 9-night silent failure of April-May 2026
# proved that "no signal" is the worst signal — the operator only
# learns about it during an unrelated audit.
#
# This workflow polls daily for two independent freshness signals
# on backup-neon.yml. If either is older than 36h, it opens (or
# comments on) the same `[backup]` alert issue used by the publish +
# drill workflows.
#
#   1. Most recent SUCCESS run, any event. Catches "publish is
#      firing but every run fails" — including the case where push
#      events keep generating phantom failed runs that fooled the
#      original single-dimension heartbeat into reporting healthy.
#   2. Most recent SCHEDULE-event run. Catches "cron stopped firing
#      altogether" without any masking from push or
#      workflow_dispatch events.
#
# Either dimension going stale fires the alert. 36h = 1.5x the 24h
# nightly cadence; gives one full missed run before flagging,
# absorbs cron drift.
#
# History note: this two-dimensional design replaced the original
# single-dimension (any-event age) check after the May 2026 outage,
# when phantom push runs masked a 5-day cron silence. PR-X1.
#
# Limitation: this workflow is *itself* a scheduled cron, so a global
# "disable scheduled workflows" event silences the heartbeat too. The
# proper fix is a third-party uptime monitor (Better Uptime, etc.)
# polling a webhook this workflow updates. Deferred — at single-tenant
# scale, the operator's regular repo activity keeps both workflows
# enabled, and the bilateral-disable failure mode is dominated by
# other "all of GitHub is dead" scenarios that have their own
# detection paths (Vercel + Fly health checks, user reports).

on:
  schedule:
    # 12:00 UTC daily — 5h after backup-neon.yml's 07:00 UTC fire.
    # Gives the publish workflow ample time to complete + variance,
    # and lets a manually-triggered same-day backup count toward the
    # heartbeat freshness window.
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  # Need actions:read to query workflow run history; issues:write to
  # post the alert. No contents:write — heartbeat doesn't push code.
  actions: read
  issues: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check backup workflow recency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # 36h freshness window. Bump only if you genuinely change
          # the backup cadence (e.g. to weekly), and update the
          # cron schedule above to match.
          MAX_HOURS: 36
        run: |
          set -euo pipefail
          # Two-dimensional freshness check. The original heartbeat
          # only compared "most recent run age" against MAX_HOURS,
          # which silently misses two failure modes that combined
          # to keep the operator blind during the May 2026 outage:
          #
          #   1. Phantom failed runs that GitHub creates on push for
          #      workflows whose `on:` filter doesn't match. They
          #      keep "most recent run" young and the original
          #      heartbeat reports OK even though no green backup
          #      ever lands. The fix: also check "most recent
          #      SUCCESS" age.
          #
          #   2. Scheduled cron quietly stops firing (GitHub
          #      scheduling drift / repo-inactivity disable / silent
          #      workflow re-registration after edits). Push events
          #      keep generating phantom runs that mask this. The
          #      fix: also check "most recent SCHEDULE-event run"
          #      age separately from any-event age.
          #
          # Either dimension going stale fires the alert. Together
          # they're the "is the publish pipeline actually shipping
          # off-site backups" question stated correctly.
          NOW_EPOCH=$(date -u +%s)

          # --- Dimension 1: most recent successful run, any event.
          LATEST_GREEN=$(gh api "repos/$REPO/actions/workflows/backup-neon.yml/runs?per_page=30" \
                         --jq '[.workflow_runs[] | select(.conclusion == "success")][0] // empty')

          # --- Dimension 2: most recent SCHEDULE-event run.
          # `event=schedule` filter excludes push / workflow_dispatch
          # so a manual dispatch can't mask a stopped cron.
          LATEST_SCHED=$(gh api "repos/$REPO/actions/workflows/backup-neon.yml/runs?per_page=5&event=schedule" \
                         --jq '.workflow_runs[0] // empty')

          fail=0

          if [ -z "$LATEST_GREEN" ]; then
            echo "::error::No SUCCESSFUL backup-neon.yml run found in the last 30 runs. Publish has been failing." >&2
            fail=1
          else
            GREEN_AT=$(echo "$LATEST_GREEN" | jq -r '.created_at')
            GREEN_EPOCH=$(date -u -d "$GREEN_AT" +%s)
            GREEN_AGE=$(( (NOW_EPOCH - GREEN_EPOCH) / 3600 ))
            GREEN_URL=$(echo "$LATEST_GREEN" | jq -r '.html_url')
            echo "Latest green run: $GREEN_AT (${GREEN_AGE}h ago)  $GREEN_URL"
            if [ "$GREEN_AGE" -gt "$MAX_HOURS" ]; then
              echo "::error::Latest successful backup is ${GREEN_AGE}h old (>${MAX_HOURS}h)." >&2
              fail=1
            fi
          fi

          if [ -z "$LATEST_SCHED" ]; then
            echo "::error::No SCHEDULE-triggered backup-neon.yml run found. Cron has never fired or was disabled." >&2
            fail=1
          else
            SCHED_AT=$(echo "$LATEST_SCHED" | jq -r '.created_at')
            SCHED_EPOCH=$(date -u -d "$SCHED_AT" +%s)
            SCHED_AGE=$(( (NOW_EPOCH - SCHED_EPOCH) / 3600 ))
            SCHED_CONCL=$(echo "$LATEST_SCHED" | jq -r '.conclusion // ""')
            SCHED_URL=$(echo "$LATEST_SCHED" | jq -r '.html_url')
            echo "Latest schedule run: $SCHED_AT (${SCHED_AGE}h ago, conclusion=$SCHED_CONCL)  $SCHED_URL"
            if [ "$SCHED_AGE" -gt "$MAX_HOURS" ]; then
              echo "::error::Latest schedule-triggered run is ${SCHED_AGE}h old (>${MAX_HOURS}h). Cron stopped firing." >&2
              fail=1
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Heartbeat OK — last green run within ${MAX_HOURS}h AND last scheduled run within ${MAX_HOURS}h."

      - name: Open or update failure issue
        # Same dedup pattern + same issue title as the publish + drill
        # workflows so all three converge on a single alert thread.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="[backup] Nightly Neon backup is failing"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Heartbeat only has one substantive step today, but name
          # it anyway so the three backup workflows produce alert
          # comments in the same shape — easier to scan the thread.
          FAILED_STEP=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
              --jq '[.jobs[].steps[]? | select(.conclusion == "failure")][0].name // "unknown"' \
              2>/dev/null || echo "unknown")
          COMMENT="Heartbeat tripped — backup-neon.yml is failing one of: most-recent-green age OR most-recent-schedule age. $RUN_URL  (UTC $NOW)
          Failed step: \`$FAILED_STEP\`"
          EXISTING=$(gh issue list \
              --state open \
              --search "in:title \"$TITLE\"" \
              --json number \
              --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Appending to existing alert issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$COMMENT"
          else
            echo "Opening new alert issue"
            BODY=$(cat <<EOF
          The nightly backup heartbeat tripped — \`backup-neon.yml\`
          is failing one of two independent freshness checks:

          1. **No successful run in 36h** — publish has been red for
             a full cycle. Backups aren't landing in Releases or R2
             even if the workflow itself is firing.
          2. **No schedule-triggered run in 36h** — cron has stopped
             firing. The publish workflow might still appear "active"
             via push or workflow_dispatch events, but the daily
             schedule isn't running. This is the failure mode that
             the original heartbeat (single-dimension age check)
             silently missed.

          $COMMENT

          **Common causes:**
          - GitHub disabled the scheduled workflow due to repo
            inactivity. Re-enable: Actions tab → "Nightly Neon backup"
            workflow → "Enable workflow" button.
          - GitHub Actions had a scheduling outage. Check
            https://www.githubstatus.com.
          - The workflow file was edited in a way that prevents
            scheduling (rare; usually surfaces on push). \`git log
            -p .github/workflows/backup-neon.yml\` to inspect.
          - Publish step itself failing — open the latest red run
            and read the first \`::error::\` line. Most common: PG
            client/server major mismatch (bump \`postgresql-client-N\`
            in BOTH publish + drill workflows; see PR #136 + the
            workflow-lint guard).
          - Readonly Neon role lost \`SELECT\` grants on a critical
            table. Re-grant: \`GRANT SELECT ON ALL TABLES IN SCHEMA
            public TO backup\`.

          **Close this issue** once a fresh GREEN \`backup-neon.yml\`
          schedule-triggered run lands (manual dispatch alone is no
          longer sufficient — schedule must fire). The next heartbeat
          will silently pass.
          EOF
          )
            gh issue create --title "$TITLE" --body "$BODY"
          fi
