name: Nightly Neon backup

# Independent off-site backup of the production Postgres DB. Runs on a
# fixed schedule + allows manual dispatch for ad-hoc dumps during a
# recovery drill or before a risky migration.
#
# Output: a GPG-symmetric-encrypted custom-format pg_dump file attached
# to a GitHub Release tagged `backup-YYYY-MM-DD`. Releases are
# immutable once created; restore via `backend/scripts/restore_from_dump.sh`
# or the manual procedure in docs/DISASTER_RECOVERY.md.
#
# Why GitHub Releases and not S3 / R2 / off-cloud: free, no new IAM to
# manage, audit trail via the Releases UI, different blast radius from
# Neon + Fly. For a single-user app with small DB, Releases is the
# right tool. Re-evaluate if the dump ever exceeds a few GB or the
# repo goes public (the encrypted file would still be safe but the
# existence of nightly Releases is observable).
#
# Required repo secrets (Settings → Secrets → Actions):
#   NEON_READONLY_DATABASE_URL  — connection string for a READ-ONLY
#       Neon role. Create this role with `CREATE ROLE backup ... LOGIN`
#       + `GRANT CONNECT ON DATABASE ... TO backup` + `GRANT USAGE ON
#       SCHEMA public TO backup` + `GRANT SELECT ON ALL TABLES IN
#       SCHEMA public TO backup`. Don't reuse the app's role — the
#       blast radius of a leaked GitHub Actions secret should be
#       "read a nightly dump," not "drop the DB."
#
#   BACKUP_PASSPHRASE           — GPG symmetric key for the dumps.
#       32+ random characters. Store it here + in the operator's
#       password manager. WITHOUT THIS PASSPHRASE, EVERY BACKUP IS
#       A BRICK — document prominently (and we do, in
#       docs/DISASTER_RECOVERY.md).

on:
  schedule:
    # 07:00 UTC every day — ~02:00 Eastern, off-peak. Avoid 00:00 / 06:00
    # because GitHub schedules those slots heavily and often defers.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional label for the Release (e.g. "pre-migration")'
        required: false
        default: ''

# Permissions: `contents: write` is needed to publish Releases.
# `issues: write` is needed by the failure-alerting step to open /
# update an issue when a run fails. Explicitly narrow — a compromised
# workflow can't do arbitrary pushes or read repo metadata.
permissions:
  contents: write
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest
    # No timeout-minutes because dumps are small; the default 6h is fine.
    # If the DB grows past a few GB, revisit both timeout and storage.
    steps:
      - uses: actions/checkout@v4

      - name: Install postgres client + gpg
        # Ubuntu's default `postgresql-client` package lags the
        # current Postgres major by 1-2 versions (24.04 ships
        # PG 16; Neon production is on PG 17 as of 2026-Q2). A
        # pg_dump that's older than the server aborts with
        # `server version mismatch` — which is exactly how this
        # workflow has been failing every night since it landed.
        # Install from PostgreSQL's official apt repo and pin to
        # PG 17 explicitly so the version is visible in the diff
        # when Neon eventually moves to 18.
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17

      - name: Verify pg_dump version
        # Dumps created with newer pg_dump can't be restored by older
        # pg_restore. Log the version so a restore mismatch is
        # diagnosable from the Actions log alone. Must report 17.x
        # — anything older means the apt pin above silently fell
        # back to Ubuntu's default package.
        run: |
          pg_dump --version
          pg_dump --version | grep -q ' 17\.' || {
            echo "::error::Expected pg_dump 17.x but got a different major. Restore-time mismatch likely." >&2
            exit 1
          }

      - name: Pre-flight client/server version compat
        env:
          NEON_URL: ${{ secrets.NEON_READONLY_DATABASE_URL }}
        # PR #136 fixed the symptom (PG 16 client vs PG 17 server)
        # by pinning the client to 17. The next time Neon does a
        # major upgrade, that pin goes stale and pg_dump aborts with
        # an opaque "server version mismatch" line buried in step
        # output. Surface the mismatch BEFORE the dump runs, with
        # an actionable error message — "bump postgresql-client-N
        # in this file" rather than "investigate pg_dump exit 1."
        #
        # Lives in its own step so the failure attribution in the
        # GitHub Actions summary is unambiguous: the operator sees
        # "Pre-flight ... failed" instead of "Dump + encrypt failed"
        # and skips the wrong-rabbit-hole investigation.
        run: |
          set -euo pipefail
          if [ -z "${NEON_URL:-}" ]; then
            echo "::error::NEON_READONLY_DATABASE_URL secret is not set." >&2
            exit 1
          fi
          # server_version_num is monotonically increasing across
          # majors: 170000 = PG 17.0, 180000 = PG 18.0, etc.
          # Integer division by 10000 yields the major.
          SERVER_NUM=$(psql "$NEON_URL" -tA -c "SHOW server_version_num" | tr -d '[:space:]')
          if [ -z "$SERVER_NUM" ] || ! [[ "$SERVER_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not read server_version_num from Neon (got: '$SERVER_NUM')." >&2
            exit 1
          fi
          SERVER_MAJOR=$((SERVER_NUM / 10000))
          CLIENT_MAJOR=$(pg_dump --version | grep -oE '[0-9]+\.[0-9]+' | head -n 1 | cut -d. -f1)
          echo "client major: $CLIENT_MAJOR"
          echo "server major: $SERVER_MAJOR"
          if [ "$CLIENT_MAJOR" -lt "$SERVER_MAJOR" ]; then
            cat >&2 <<EOF
          ::error::pg_dump major ($CLIENT_MAJOR) is older than the Neon server major ($SERVER_MAJOR).
          pg_dump will abort with 'server version mismatch'. Bump the
          'postgresql-client-N' line in this workflow (and in
          backup-restore-drill.yml — both pins move together) to
          $SERVER_MAJOR or newer.
          EOF
            exit 1
          fi

      - name: Dump + encrypt
        env:
          NEON_URL: ${{ secrets.NEON_READONLY_DATABASE_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        # --format=custom produces a compressed binary dump that
        # pg_restore can selectively restore from (per-table, per-schema).
        # Streamed through gpg so the plaintext never lands on disk.
        # AES256 + SHA256 are the conservative defaults.
        run: |
          set -euo pipefail
          if [ -z "$NEON_URL" ]; then
            echo "::error::NEON_READONLY_DATABASE_URL secret is not set." >&2
            exit 1
          fi
          if [ -z "$PASSPHRASE" ]; then
            echo "::error::BACKUP_PASSPHRASE secret is not set." >&2
            exit 1
          fi
          pg_dump --format=custom --no-owner --no-privileges "$NEON_URL" \
            | gpg --symmetric --cipher-algo AES256 \
                  --s2k-digest-algo SHA256 --s2k-count 65536 \
                  --batch --passphrase-fd 3 --output backup.dump.gpg \
                  3<<<"$PASSPHRASE"
          ls -lh backup.dump.gpg
          # Sanity: empty or near-empty dumps mean something is wrong
          # (role lost SELECT grants, DB empty, whatever). Fail loudly
          # rather than ship a brick. 1 KB is smaller than a single
          # empty-schema custom-format pg_dump header.
          size=$(stat -c%s backup.dump.gpg)
          if [ "$size" -lt 1024 ]; then
            echo "::error::Backup file suspiciously small ($size bytes). Failing." >&2
            exit 1
          fi

      - name: Capture schema state
        env:
          NEON_URL: ${{ secrets.NEON_READONLY_DATABASE_URL }}
        # Restoring a backup against forward-migrated code is
        # guesswork unless you know which `schema_migrations` rows
        # were applied at dump time. Capture the applied list as a
        # plaintext sidecar so the operator running the restore
        # knows which migrations to apply forward (or that the
        # dump pre-dates a schema change that's now load-bearing).
        #
        # Tiny race window vs. the dump (a migration committing
        # between this query and pg_dump's snapshot start would
        # show up in the dump but not in this file). For perfect
        # coherence we'd export a snapshot id and pg_dump
        # --snapshot, but that's complexity unjustified at this
        # DB size + once-daily-at-02:00-ET deploy cadence.
        run: |
          set -euo pipefail
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "# schema_migrations as captured ${NOW}"
            echo "# Sidecar to backup.dump.gpg in this Release."
            echo "#"
            echo "# Restore + bring forward:"
            echo "#   1. Restore backup.dump.gpg into a fresh DB."
            echo "#   2. Run backend/scripts/migrate.py against that DB."
            echo "#      Any migration filenames present in current code"
            echo "#      but ABSENT below are applied forward in order."
            echo "#"
            echo "# Format: filename<TAB>applied_at"
            echo
            psql "$NEON_URL" -tA -F $'\t' \
              -c "SELECT filename, applied_at FROM schema_migrations ORDER BY applied_at, filename"
          } > schema_state.txt
          echo "----- schema_state.txt -----"
          cat schema_state.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTE: ${{ inputs.note }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TAG="backup-${DATE}"
          # If today's release already exists (another run), append a
          # suffix so we don't clobber the earlier dump. Second runs
          # are rare; typically only during a manual dispatch after
          # the scheduled one already fired.
          if gh release view "$TAG" >/dev/null 2>&1; then
            TAG="${TAG}-$(date -u +%H%M)"
          fi
          TITLE="DB backup $DATE"
          if [ -n "$NOTE" ]; then
            TITLE="$TITLE ($NOTE)"
          fi
          # Two assets uploaded:
          #   backup.dump.gpg   — encrypted custom-format dump
          #   schema_state.txt  — plaintext list of applied migrations
          # The schema_state file is intentionally NOT encrypted: it
          # contains migration filenames, not data. Operators need to
          # read it BEFORE decrypting (to decide whether this backup
          # is even the right vintage to restore).
          gh release create "$TAG" backup.dump.gpg schema_state.txt \
            --title "$TITLE" \
            --notes "Automated nightly backup. Two artifacts:

          - \`backup.dump.gpg\` — the encrypted custom-format pg_dump. Decrypt with \`BACKUP_PASSPHRASE\`; restore with \`backend/scripts/restore_from_dump.sh\`.
          - \`schema_state.txt\` — plaintext list of \`schema_migrations\` rows applied at dump time. Read this BEFORE deciding to restore: it tells you which migrations to apply forward against current code.

          See docs/DISASTER_RECOVERY.md for the full runbook." \
            --latest=false

      - name: Prune old backups (>30 days)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Delete Release tags older than 30 days. Matches the
        # 30-day retention policy documented in DISASTER_RECOVERY.md.
        # If you need a longer history for audit, increase RETENTION_DAYS
        # here AND update the doc so the two stay in sync.
        run: |
          set -euo pipefail
          RETENTION_DAYS=30
          CUTOFF=$(date -u -d "$RETENTION_DAYS days ago" +%Y-%m-%d)
          gh release list --limit 200 --json tagName,createdAt \
            | jq -r --arg cutoff "$CUTOFF" '
                .[]
                | select(.tagName | startswith("backup-"))
                | select(.createdAt < $cutoff)
                | .tagName
              ' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "Pruning old backup: $tag"
                gh release delete "$tag" --cleanup-tag --yes
              done

      - name: Open or update failure issue
        # Why this exists: between 2026-04-22 and 2026-05-02 this
        # workflow failed nine consecutive nights without anyone
        # noticing — there were no off-site backups for ten days
        # and the operator only learned about it during an
        # unrelated audit. GitHub does not email on scheduled-
        # workflow failure by default; the only signal was the
        # red badge on the Actions tab. This step closes that gap
        # by surfacing failures as GitHub issues, which DO send
        # notifications and survive across scheduled runs.
        #
        # De-dup: if an open `[backup]` failure issue already
        # exists, comment on it instead of opening a new one.
        # Otherwise 30 nights of failure → 30 issues, which is
        # noise that trains people to ignore the signal.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="[backup] Nightly Neon backup is failing"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMENT="Failed run: $RUN_URL  (UTC $NOW)"
          # `--search "in:title"` constrains to title-only matches
          # so a stray issue that mentions the phrase in its body
          # doesn't suppress legitimate alerts.
          EXISTING=$(gh issue list \
              --state open \
              --search "in:title \"$TITLE\"" \
              --json number \
              --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Appending to existing alert issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$COMMENT"
          else
            echo "Opening new alert issue"
            BODY=$(cat <<EOF
          The nightly Neon backup workflow has failed.

          $COMMENT

          **Why this matters:** there is no off-site backup of production
          for any night this issue stays open. See
          \`docs/DISASTER_RECOVERY.md\` § Scenario 2 for what's at stake.

          **First diagnostic:** open the failed run above, expand the
          first red step. The most common failure modes are:
          - \`pg_dump: server version mismatch\` — Neon upgraded the
            server major; bump the \`postgresql-client-N\` pin in this
            workflow (see PR #136 for the canonical fix shape).
          - \`NEON_READONLY_DATABASE_URL secret is not set\` — secret
            rotated or revoked.
          - \`BACKUP_PASSPHRASE secret is not set\` — same.

          **Close this issue** once a green run lands. Subsequent
          failures will reopen it (technically: comment on the still-
          open one) so the alert thread stays consolidated.
          EOF
          )
            gh issue create --title "$TITLE" --body "$BODY"
          fi
